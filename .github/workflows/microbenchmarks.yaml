name: Microbenchmarks

# ------------------------------------------------------------------------------
# Workflow Settings
# ------------------------------------------------------------------------------

on:
  schedule:
    - cron: "57 2 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  # ----------------------------------------------------------------------------
  # Microbenchmarks
  # ----------------------------------------------------------------------------

  microbenchmarks:
    name: microbenchmarks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-rust-1.96.0-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-1.96.0-bench-
          save-always: true

      - name: Run microbenchmarks
        run: cargo bench -p benchmarks

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: microbenchmark-results
          path: target/criterion/
